<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Signal &amp; Noise: The Keeper</title>
<!--
=====================================================================================
SIGNAL & NOISE: THE KEEPER - spec (numbered, per building-games Phase 0)
1. CORE LOOP: read a noisy sky gauge, LIGHT the lamp (warn; crew fishes nothing) or
   leave it DARK (crew fishes); storms sink boats caught out; the crew LEARNS whether
   the lamp is worth believing (hidden trust, Rescorla-Wagner delta rule).
2. STORMS ARE DEALT, NEVER ROLLED: season 1 = exactly 5 storm cards in 13 nights,
   stratified [1 in n1-4, 3 in n5-9, 1 in n10-13], shuffled within strata. The gauge
   is a class-conditional reading: storm nights ~N(0.62,.13), calm ~N(0.38,.13).
   Randomize order, never outcomes. Finale (n14) is a guaranteed storm outside the deck.
3. EVIDENCE: on lit nights the crew's response is Binomial(7, heedP(trust)) "moored"
   count, drawn on the dock; trend line derives ONLY from moored counts; Odell barks
   key to the same counts; Marisol gossip (trust tercile) fires at musters AFTER the
   prediction locks. Trust is never a number, bar, or percent before the debrief.
4. MUSTERS at nights [2,5,8,11,13]: predict whether the crew would heed a lit lamp
   (scored on disposition trust>=50). WIN = survive the Deep (ring + trust>=50) AND
   catch >= target AND >= 4 of 5 musters right. Mercy rule ends dead seasons early.
5. LOSE: boats gone (S2 only; S1 floor 7-5=2), Deep taken, hungry, or misread crew.
6. KEYS: L light, D dark, R ring/heed, W wave/not, Space next. All buttons real DOM.
7. EDUCATION: concept named only in the debrief (with the hidden-trust curve reveal
   + night log); one-shot plain-language insights at first occurrence of each
   conditioning event; no jargon in play; roman-voice (no em dashes).
=====================================================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Nunito:wght@600;700;800;900&family=Spectral:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f2937; --paper:#f6efdd; --edge:#cbb88f; --sea:#16202f; --sky1:#1b2740; --sky2:#2c3d5c;
    --lamp:#f5c14e; --lampDk:#caa033; --good:#5fb585; --bad:#d2694a; --warn:#e0a23a; --deep:#3f8c87;
    --text:#dfe6f3; --muted:#9fb0c6;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  [hidden]{ display:none !important; }
  html,body{ margin:0; padding:0; }
  body{ font-family:'Nunito',system-ui,Segoe UI,Roboto,Arial,sans-serif; color:var(--text);
    background:radial-gradient(120% 80% at 50% 0%, #2b3c5c 0%, #161f30 70%, #0f1622 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:10px; }
  #wrap{ width:100%; max-width:1060px; }
  #topbar{ display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:8px 12px; margin-bottom:8px; min-height:34px; }
  #topbar .title{ font-family:'Cinzel',serif; font-weight:700; color:#f3ead4; font-size:17px; letter-spacing:.6px; }
  .tbtns{ display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .tbtn{ display:inline-flex; align-items:center; gap:5px; background:var(--paper); border:2px solid var(--edge); border-radius:9px; padding:6px 12px; font-size:13px; font-weight:800; color:var(--ink); cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.25); font-family:inherit; }
  .tbtn:hover{ filter:brightness(1.05); } .tbtn:active{ transform:translateY(1px); }
  .vol{ display:inline-flex; align-items:center; gap:6px; background:var(--paper); border:2px solid var(--edge); border-radius:9px; padding:4px 9px; font-size:13px; color:var(--ink); box-shadow:0 2px 6px rgba(0,0,0,.25); }
  .vol input[type=range]{ width:78px; accent-color:var(--lampDk); cursor:pointer; }
  #stagewrap{ position:relative; width:100%; border-radius:14px; overflow:hidden; box-shadow:0 10px 30px rgba(8,14,26,.45); border:3px solid #0e1a30; background:#16202f; }
  #bgvid{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; display:none; }
  #bgvid.show{ display:block; }
  canvas#stage{ display:block; width:100%; height:auto; position:relative; z-index:1; }
  #overlay{ z-index:2; }
  /* gameplay chrome exists only once a season is underway */
  #wrap:not(.playing) #hud, #wrap:not(.playing) #belief, #wrap:not(.playing) #deepchip, #wrap:not(.playing) #legend,
  #wrap:not(.playing) #decide, #wrap:not(.playing) #log, #wrap:not(.playing) #insight, #wrap:not(.playing) #fieldnote{ display:none; }
  /* story box on the menu: the real experiment behind the season */
  .story{ background:#fbf4e2; border:2px solid var(--lampDk); border-left-width:6px; border-radius:11px; padding:11px 14px; margin:0 0 12px; }
  .story .stitle{ font-size:10.5px; font-weight:900; letter-spacing:.7px; text-transform:uppercase; color:#a9802a; margin-bottom:5px; }
  .story p{ font-family:'Spectral',serif; font-size:14px; line-height:1.55; color:#41372b; margin:0 0 7px; }
  .story p.tie{ color:#5a4a2e; }
  .story a{ font-size:12.5px; font-weight:800; color:#8a5a2a; text-decoration:none; }
  #fieldnote.s3{ background:rgba(46,34,16,.72); border-left-color:#e0b978; }
  #fieldnote.s3 .pill{ background:#e0b978; } #fieldnote.s3 .lens{ color:#c9a86f; } #fieldnote.s3 .txt b{ color:#f0d59a; }
  /* HUD */
  #hud{ display:flex; gap:8px; margin-top:9px; justify-content:center; flex-wrap:wrap; }
  #hud .stat{ flex:1 1 96px; min-width:96px; } #hud #tCatch{ flex:1.4 1 130px; }
  .stat{ background:rgba(16,24,40,.55); border:2px solid var(--edge); border-radius:11px; padding:8px 10px; text-align:center; }
  .stat .lab{ font-size:10.5px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); }
  .stat .val{ font-size:19px; font-weight:900; color:#fff; line-height:1.2; }
  .stat .boats{ font-size:18px; letter-spacing:1px; }
  /* catch bar */
  .cbar{ position:relative; height:12px; background:rgba(255,255,255,.13); border-radius:7px; margin-top:6px; overflow:visible; }
  .cbar .cfill{ position:absolute; inset:0 auto 0 0; width:0; background:linear-gradient(90deg,#4f8f9a,#5fb585); border-radius:7px; transition:width .4s cubic-bezier(.2,.7,.2,1); }
  .cbar.done .cfill{ background:linear-gradient(90deg,#d8a13a,#f5c14e); box-shadow:0 0 10px rgba(245,193,78,.5); }
  .cbar .notch{ position:absolute; top:-3px; bottom:-3px; width:2px; background:#fff; opacity:.85; }
  .cbar .notch::after{ content:'🐟'; position:absolute; top:-15px; left:50%; transform:translateX(-50%); font-size:10px; }
  /* deep chip */
  #deepchip{ margin-top:8px; text-align:center; font-family:'Spectral',serif; font-style:italic; font-size:13px; color:#8fb0c9;
    background:rgba(10,18,32,.55); border:1px solid #24405c; border-radius:9px; padding:4px 10px; }
  #deepchip b{ color:#bcd7ea; }
  /* belief meter: watch the conditioning take hold */
  #belief{ margin-top:9px; background:rgba(16,24,40,.55); border:2px solid var(--edge); border-radius:11px; padding:10px 12px 9px; }
  #belief .brow{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  #belief .blab{ font-size:11px; font-weight:800; letter-spacing:.4px; text-transform:uppercase; color:var(--muted); }
  #belief .blab.amber{ color:#d3ab72; }
  #belief .bnote{ font-size:11px; font-weight:800; color:#cfd9ea; white-space:nowrap; }
  #belief .bar{ position:relative; height:16px; background:rgba(255,255,255,.12); border-radius:9px; margin:6px 0 3px; }
  #belief .fill{ position:absolute; inset:0 auto 0 0; width:0; border-radius:9px; transition:width .55s cubic-bezier(.2,.7,.2,1); background:linear-gradient(90deg,var(--warn),var(--good)); }
  #belief .fill.amber{ background:linear-gradient(90deg,#a9762e,#e6bd7f); }
  #belief .heed{ position:absolute; top:-3px; bottom:-3px; width:2px; background:#fff; opacity:.85; }
  #belief .heed::after{ content:'they heed'; position:absolute; top:-13px; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:8.5px; font-weight:800; color:#cfd9ea; }
  #belief .bar2row{ margin-top:9px; }
  #belief .hint{ font-family:'Spectral',serif; font-size:12.5px; color:#cfd9ea; margin-top:7px; min-height:16px; }
  /* decision */
  #decide{ margin-top:11px; text-align:center; }
  #sky{ max-width:420px; margin:0 auto 10px; }
  .skytop{ display:flex; justify-content:space-between; align-items:baseline; font-size:10.5px; font-weight:800; letter-spacing:.6px; color:var(--muted); }
  .skytop .skytitle{ font-family:'Cinzel',serif; font-size:12px; letter-spacing:.5px; color:var(--lamp); text-transform:none; }
  .skybar{ position:relative; height:16px; margin-top:5px; border-radius:9px; overflow:hidden;
    background:linear-gradient(90deg,#4f8f9a 0%,#5fb585 22%,#e0a23a 60%,#d2694a 100%); box-shadow:inset 0 1px 3px rgba(0,0,0,.4); }
  .skyneedle{ position:absolute; top:-4px; bottom:-4px; width:4px; left:0; background:#fff; border-radius:2px; box-shadow:0 0 6px rgba(0,0,0,.6); transition:left .35s cubic-bezier(.2,.7,.2,1); }
  .skyneedle::after{ content:'▲'; position:absolute; top:-13px; left:50%; transform:translateX(-50%); color:#fff; font-size:10px; }
  #cueline{ font-family:'Spectral',serif; font-size:16px; color:#eef2fa; min-height:46px; line-height:1.45; }
  #cueline b{ color:var(--lamp); }
  #cueline .bark{ display:flex; gap:9px; align-items:center; justify-content:center; margin-top:7px; font-size:14.5px; color:#d8e2f2; }
  #cueline .bark img{ width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid var(--lampDk); flex:none; }
  .btnrow{ display:flex; gap:12px; justify-content:center; margin-top:8px; flex-wrap:wrap; }
  .big{ border:none; cursor:pointer; font-family:inherit; font-weight:900; font-size:17px; padding:13px 24px; border-radius:13px; color:#fff; position:relative;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 4px 0 rgba(0,0,0,.28), 0 6px 14px rgba(0,0,0,.3); transition:transform .1s; }
  .big:hover{ transform:translateY(-2px); } .big:active{ transform:translateY(2px); }
  .big.light{ background:linear-gradient(180deg,#f5c14e,#d8a13a); color:#3a2a08; }
  .big.dark{ background:linear-gradient(180deg,#5a6678,#3c4658); }
  .big .sub{ display:block; font-size:11px; font-weight:700; opacity:.85; margin-top:2px; }
  .big:disabled{ opacity:.4; cursor:default; transform:none; }
  #next{ background:linear-gradient(180deg,#56a07e,#3c7a5d); }
  #next .ring{ position:absolute; inset:-5px; border:3px solid rgba(255,255,255,.65); border-radius:16px; pointer-events:none; opacity:0; }
  #next.auto .ring{ opacity:1; animation:shrinkring 2.5s linear forwards; }
  @keyframes shrinkring{ from{ clip-path:inset(0 0 0 0); } to{ clip-path:inset(0 0 0 100%); } }
  /* outcome log */
  #log{ margin-top:11px; display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
  .chip{ font-size:11px; font-weight:800; padding:3px 8px; border-radius:20px; color:#13202e; }
  .chip.hit{ background:#8fd3ab; } .chip.fa{ background:#ecb6a6; } .chip.miss{ background:#e4a06a; } .chip.cr{ background:#c9d2df; }
  /* keeper's log insight */
  #insight{ margin:10px auto 0; max-width:480px; background:#fff7e2; border:2px solid var(--lampDk); border-left-width:6px; border-radius:9px; padding:9px 13px; text-align:left; }
  #insight .lab{ font-size:9.5px; font-weight:900; letter-spacing:.7px; text-transform:uppercase; color:#a9802a; display:block; margin-bottom:2px; }
  #insight .txt{ font-family:'Spectral',serif; font-size:13.5px; line-height:1.5; color:#4a3d2a; }
  /* the psychology lens: a live academic label under the story, every conditioning night */
  #legend{ margin-top:8px; text-align:center; font-size:11px; color:#9fb4cc; line-height:1.5; }
  #legend b{ color:#cfe0f2; }
  #legend .coach b{ color:#5a3a00; }   /* on the amber callout, CS/US/CR read dark; the pale-blue above is for the dark legend bar */
  #fieldnote{ margin:9px auto 0; max-width:480px; background:rgba(20,42,52,.72); border:1px solid #2f6b78; border-left:5px solid #4fb0c4; border-radius:9px; padding:8px 12px; text-align:left; }
  #fieldnote .pill{ display:inline-block; font-size:9.5px; font-weight:900; letter-spacing:.7px; text-transform:uppercase; color:#0c1c22; background:#5fc6d8; border-radius:20px; padding:2px 9px; margin-bottom:4px; }
  #fieldnote .lens{ font-size:9px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; color:#6fb9c9; margin-left:6px; }
  #fieldnote .txt{ display:block; font-family:'Spectral',serif; font-size:13.5px; line-height:1.5; color:#dbeaf0; }
  #fieldnote .txt b{ color:#8fe0ef; font-style:normal; }
  .dmap{ display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
  .dmap .m{ flex:1 1 150px; background:#eef6ee; border:2px solid #7fb6a0; border-radius:10px; padding:8px 11px; }
  .dmap .m b{ color:#2c6b5a; } .dmap .m .t{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:#4a8b78; }
  @keyframes drawline{ from{ stroke-dashoffset:1400; } to{ stroke-dashoffset:0; } }
  @media (prefers-reduced-motion: no-preference){ .curveline{ stroke-dasharray:1400; animation:drawline 1.3s ease-out forwards; } }
  /* overlay + panels */
  #overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:18px; background:rgba(8,12,22,.66); backdrop-filter:blur(2px); }
  #overlay.titlescreen{ background:radial-gradient(120% 90% at 50% 32%, rgba(10,16,28,.28), rgba(8,12,22,.74)); backdrop-filter:none; }
  .titlecard{ text-align:center; color:#eaf0fb; max-width:560px; padding:4px 16px; }
  .titlecard .wm{ font-family:'Cinzel',serif; font-weight:700; letter-spacing:2px; font-size:clamp(34px,7vw,52px); line-height:.92; margin:0;
    background:linear-gradient(180deg,#fff3cf 0%,#f4cc63 46%,#caa033 72%,#8f6f22 100%); -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent; filter:drop-shadow(0 2px 1px rgba(0,0,0,.55)) drop-shadow(0 0 24px rgba(245,193,78,.22)); }
  .titlecard .sub{ font-family:'Cinzel',serif; font-weight:600; color:#e9eefb; font-size:14px; letter-spacing:3px; text-transform:uppercase; margin:9px 0 0; text-shadow:0 1px 8px rgba(0,0,0,.8); }
  .titlecard .rule{ width:120px; height:1px; background:linear-gradient(90deg,transparent,#caa033,transparent); margin:9px auto 0; }
  .titlecard .hook{ font-family:'Spectral',serif; font-style:italic; color:#cfdaee; font-size:14.5px; max-width:430px; margin:13px auto 0; line-height:1.65; text-shadow:0 1px 7px rgba(0,0,0,.85); }
  .titlecard .hook p{ margin:0 0 4px; }
  .titlecard .bigbtn{ border:none; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:900; font-size:19px; padding:14px 36px; border-radius:13px; color:#3a2a08; background:linear-gradient(180deg,#f5c14e,#d8a13a); box-shadow:inset 0 1px 0 rgba(255,255,255,.3),0 5px 0 rgba(0,0,0,.28),0 8px 18px rgba(0,0,0,.35); margin-top:18px; }
  .titlecard .bigbtn:hover{ transform:translateY(-2px); } .titlecard .bigbtn:active{ transform:translateY(2px); }
  .panel{ background:var(--paper); border:3px solid var(--edge); border-radius:18px; box-shadow:0 10px 30px rgba(8,14,26,.5); max-width:560px; width:100%; padding:22px 24px; color:#473d4a; max-height:100%; overflow:auto; }
  .panel h1{ font-family:'Cinzel',serif; font-size:26px; color:var(--ink); margin:0 0 4px; }
  .panel h2{ font-family:'Cinzel',serif; font-size:22px; color:var(--ink); margin:0 0 8px; }
  .panel h3{ font-size:12.5px; color:#2c5b66; margin:15px 0 5px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; }
  .panel p{ font-size:15px; line-height:1.55; margin:0 0 10px; }
  .panel .prose{ font-family:'Spectral',serif; font-size:16px; line-height:1.6; color:#3b3340; }
  .panel .small{ font-size:13px; color:#7a7282; }
  .panel .btn{ border:none; cursor:pointer; font-family:inherit; font-weight:800; font-size:16px; padding:12px 22px; border-radius:12px; color:#fff;
    background:linear-gradient(180deg,#4a8b9a,#2c5b66); box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 4px 0 rgba(0,0,0,.22); margin-top:8px; }
  .panel a{ color:#2c5b66; }
  .kfacts{ display:flex; gap:10px; flex-wrap:wrap; margin:6px 0; }
  .kfacts .k{ background:#fff7e2; border:2px solid var(--lampDk); border-radius:10px; padding:7px 11px; font-size:13px; color:#473d4a; font-weight:700; }
  /* night-log table (debrief) */
  .nlog{ width:100%; border-collapse:collapse; margin:6px 0 10px; font-size:11.5px; }
  .nlog th{ text-align:center; font-weight:800; color:#7a7282; padding:2px 3px; border-bottom:1px solid var(--edge); }
  .nlog td{ text-align:center; padding:2px 3px; color:#473d4a; border-bottom:1px solid #eadfc3; }
  /* slideshow: paged, digestible psychology (replaces scroll-past prose) */
  .slideshow{ display:flex; flex-direction:column; min-height:min(440px,72vh); }
  .slide{ flex:1 1 auto; display:flex; flex-direction:column; animation:slidein .28s ease-out; }
  @keyframes slidein{ from{ opacity:0; transform:translateX(14px);} to{ opacity:1; transform:none; } }
  .slide .kicker{ font-size:11px; font-weight:900; letter-spacing:.8px; text-transform:uppercase; color:#2c5b66; margin-bottom:3px; }
  .slide h2{ font-family:'Cinzel',serif; font-size:23px; color:var(--ink); margin:0 0 10px; }
  .slidevisual{ display:flex; align-items:center; justify-content:center; margin:2px 0 12px; }
  .slidevisual img{ max-width:100%; max-height:260px; border-radius:12px; border:2px solid var(--edge); object-fit:cover; box-shadow:0 6px 18px rgba(8,14,26,.3); }
  .slidevisual svg{ max-width:100%; }
  .slidevisual .portrait{ width:120px; height:120px; border-radius:50%; border:3px solid var(--lampDk); object-fit:cover; }
  .slidebody{ font-family:'Spectral',serif; font-size:17px; line-height:1.62; color:#3b3340; }
  .slidebody p{ margin:0 0 9px; } .slidebody b{ color:#2c5b66; }
  .slidenav{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:14px; padding-top:12px; border-top:1px solid #eadfc3; flex-wrap:wrap; }
  .slidenav .btn{ margin-top:0; }
  .dots{ display:flex; gap:7px; align-items:center; }
  .dot{ width:9px; height:9px; border-radius:50%; background:#d8cbb0; transition:background .2s,transform .2s; }
  .dot.on{ background:var(--lampDk); transform:scale(1.25); }
  .slidehint{ font-size:11.5px; color:#9a927f; text-align:center; margin-top:6px; }
  /* the chandlery (shop) */
  .shopgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:6px 0; }
  .shopitem{ background:#fbf4e2; border:2px solid var(--lampDk); border-radius:11px; padding:9px 11px; display:flex; flex-direction:column; }
  .si-head{ display:flex; align-items:baseline; justify-content:space-between; gap:6px; flex-wrap:wrap; }
  .si-name{ font-family:'Cinzel',serif; font-weight:700; font-size:15px; color:#5a4a2e; }
  .si-sub{ color:#8a7a58; }
  .si-effect{ font-size:13px; color:#2c5b66; font-weight:700; margin:3px 0 5px; }
  .si-teach{ font-family:'Spectral',serif; font-size:12.5px; line-height:1.45; color:#5a4a3a; flex:1 1 auto; }
  .si-lab{ display:block; font-size:9px; font-weight:900; letter-spacing:.6px; text-transform:uppercase; color:#a9802a; }
  .si-foot{ margin-top:8px; }
  .si-btn{ margin-top:0; font-size:14px; padding:9px 14px; }
  .si-owned{ font-weight:800; color:#3c7a5d; font-size:13px; }
  .si-locked{ font-weight:800; color:#9a6a4a; font-size:12.5px; }
  @media (max-width:560px){ .shopgrid{ grid-template-columns:1fr; } }
  /* the tutorial (visual-novel): characters on the sides, a dark high-contrast dialogue box at the bottom */
  .vnwrap{ position:absolute; inset:0; }
  .vn-portraits{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .vn-fig{ position:absolute; bottom:27%; width:min(34%,220px); border-radius:14px; border:3px solid var(--lamp);
    box-shadow:0 10px 30px rgba(0,0,0,.6); background:#16202f; }
  .vn-fig.left{ left:3.5%; } .vn-fig.right{ right:3.5%; }
  .vn-fig.dim{ filter:grayscale(.55) brightness(.5); border-color:#5a6678; box-shadow:0 6px 18px rgba(0,0,0,.5); }
  .vn-box{ position:absolute; left:50%; transform:translateX(-50%); bottom:5%; width:min(640px,92%);
    background:rgba(9,14,24,.95); border:2px solid var(--lamp); border-radius:15px; padding:16px 24px 16px;
    box-shadow:0 12px 38px rgba(0,0,0,.6); }
  .vn-name{ font-family:'Cinzel',serif; font-weight:700; font-size:15px; color:#f5c14e; margin-bottom:6px; letter-spacing:.3px; }
  .vn-text{ font-family:'Spectral',serif; font-size:18px; line-height:1.55; color:#f4f7fc; }
  .vn-link{ display:inline-block; margin-top:9px; color:#f5d98a; font-weight:800; font-size:13px; text-decoration:underline; }

<script>
"use strict";
/* ============================ CONFIG ============================ */
const CONFIG = {
  // Rescorla-Wagner trust update. FROZEN AS A SET with the deck strata + muster nights:
  // changing any one requires re-running the full policy battery (see spec comment).
  aRight: 0.20,            // lit + storm: trust rises toward 100
  aWolf: 0.08,             // lit + calm: cried wolf
  aMiss: 0.08,             // dark + storm: the lamp said nothing
  s1Decay: 0.12,           // unreinforced nights leak a little belief
  heedSpread: 4,           // logistic spread of heed probability around the threshold
  crewN: 7,                // the seven crews whose moorings are the visible evidence
  catchPerNight: 10,
  gaugeStorm: 0.62, gaugeCalm: 0.38, gaugeSd: 0.13,   // signal-detection gauge (d' = 1.85)
  beatMs: 700,             // resolve beats: dock answers, then the weather
  bellMs: 600,             // the muster bell holds the room
  autoMs: 2500,            // quiet-night auto-advance
  probeSpread: 12,         // graded readout spread for the probe (heedSpread stays 4 for behavior)
};
const W = 760, H = 430, STEP = 1/60;
function heedProb(trust, thresh){ return 1/(1+Math.exp(-(trust-thresh)/CONFIG.heedSpread)); }
// the CONDITIONED RESPONSE strength read on a probe (CS-alone test): a graded, gentler curve than the heed behavior
function probeReflex(v, thresh){ return 1/(1+Math.exp(-(v-thresh)/CONFIG.probeSpread)); }
/* ============================ RNG ============================ */
// TWO streams. `rng` drives ALL scored game state (deck, gauge, dock) in a fixed consumption order --
// that fixed order is what makes the headless fairness battery byte-reproducible. Probes and the between-
// season mini-games must NEVER draw from `rng`; they use `auxRng` so bots advance it harmlessly while the
// deck/trust/gauss/binom sequence stays identical.
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
let rng = mulberry32(((Math.random()*1e9)|0) || 7);
let auxRng = mulberry32(((Math.random()*1e9)|0) || 101);   // isolated: probes + mini-games only
function gauss(){ let u=0,v=0; while(!u)u=rng(); while(!v)v=rng(); return Math.sqrt(-2*Math.log(u))*Math.cos(6.28318*v); }
function gaussAux(){ let u=0,v=0; while(!u)u=auxRng(); while(!v)v=auxRng(); return Math.sqrt(-2*Math.log(u))*Math.cos(6.28318*v); }
function binom(n,p){ let k=0; for(let i=0;i<n;i++) if(rng()<p) k++; return k; }
// how many of the seven crews heeded, said in words. Keeps the magnitude without printing "0 of seven" next to a one-boat fleet.
function crewWord(m){ const n=CONFIG.crewN; if(m<=0) return 'none of the crew'; if(m>=n) return 'the whole crew'; if(m>=n*0.65) return 'most of the crew'; if(m>=n*0.35) return 'about half the crew'; return 'only a few of the crew'; }
function ucFirst(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function binomAux(n,p){ let k=0; for(let i=0;i<n;i++) if(auxRng()<p) k++; return k; }   // probe scramble only
// THE STORM INSTRUMENT (Storm-Glass -> Barometer -> Radar): a bought upgrade that sharpens the READ of the
// dealt weather, never the weather itself. It blends the primary gauge read (on rng) with an extra reading
// from auxRng, lowering the effective noise. Capped so d' never exceeds ~2.4 (an ambiguous night always survives).
// Draws ONLY from auxRng, so the deck/gauge/mooring rng sequence stays byte-identical for a keeper without one.
function skyRefine(raw, base){
  const w = [0, 0.10, 0.16, 0.22][Math.min(3, save.instrTier||0)] || 0;   // effective SD 0.13 -> 0.118 -> 0.111 -> 0.105 (d' <= 2.3, never an oracle)
  if(w<=0) return raw;
  const second = base + gaussAux()*CONFIG.gaugeSd;
  return raw*(1-w) + second*w;
}
/* ============================ ASSETS ============================ */
const IMG = {};
['bg_starlit','bg_storm','bg_dusk','bg_dawn','bg_harbor_fog','boat','deep','crew','coast_map','lighthouse_interior','portrait_marisol','portrait_odell','portrait_previous','portrait_sefu'].forEach(k=>{
  const im=new Image(); im.onload=()=>{ if(im.naturalWidth>2){ IMG[k]=im; if(typeof state!=='undefined' && (state==='menu'||state==='title') && typeof renderOverlay==='function') renderOverlay(); } };
  im.onerror=()=>{}; im.src='assets/'+k+'.webp'; });
/* background video layer (title: menu_loop; finale: deep_rising) */
(function(){ const v=document.getElementById('bgvid'); if(!v) return; v.muted=true;
  v.onerror=()=>{ if(v.src.indexOf('menu_loop')>=0){ v.onerror=null; v.dataset.key='background_video'; v.src='assets/background_video.mp4'; } };
  const kick=()=>{ if(v.classList.contains('show')){ const p=v.play&&v.play(); if(p&&p.catch) p.catch(()=>{}); } };
  v.oncanplay=kick;
  ['pointerdown','keydown','touchstart'].forEach(ev=>addEventListener(ev,kick,{once:true}));
  v.dataset.key='menu_loop'; v.src='assets/menu_loop.mp4'; })();
function showBgVideo(on, key){ const v=document.getElementById('bgvid'); if(!v) return;
  if(key && v.dataset.key!==key){ v.dataset.key=key; v.src='assets/'+key+'.mp4'; }
  v.classList.toggle('show',on);
  if(on){ const p=v.play&&v.play(); if(p&&p.catch) p.catch(()=>{}); } else { try{ v.pause(); }catch(e){} } }
function bgVideoLive(){ const v=document.getElementById('bgvid'); return v && v.classList.contains('show') && v.readyState>=2; }
/* ============================ AUDIO ============================ */
let AC=null, musicGain=null, musicVol=0.6;
function audioOn(){ if(AC) return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; return; }
  musicGain=AC.createGain(); musicGain.gain.value=0.06*musicVol; musicGain.connect(AC.destination);
  const buf=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const wind=AC.createBufferSource(); wind.buffer=buf; wind.loop=true; const wf=AC.createBiquadFilter(); wf.type='lowpass'; wf.frequency.value=480;
  const lfo=AC.createOscillator(); lfo.frequency.value=0.08; const lfg=AC.createGain(); lfg.gain.value=160; lfo.connect(lfg).connect(wf.frequency);
  wind.connect(wf).connect(musicGain);
  try{ wind.start(); lfo.start(); }catch(e){}
}
function setVol(v){ musicVol=Math.max(0,Math.min(1,v)); if(musicGain) musicGain.gain.value=0.06*musicVol; if(themeEl) themeEl.volume=0.35*musicVol; }
function blip(freq,dur,type,vol,delay){ if(!AC) return; const t=AC.currentTime+(delay||0); const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine'; o.frequency.value=freq; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.16,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.15)); o.connect(g).connect(AC.destination); o.start(t); o.stop(t+(dur||0.15)+0.02); }
const snd = {
  light(){ blip(560,0.08,'sine',0.12); blip(840,0.12,'sine',0.10,0.05); },
  dark(){ blip(300,0.10,'sine',0.10); },
  good(){ [523,659,784].forEach((f,i)=>blip(f,0.18,'sine',0.14,i*0.09)); },
  bad(){ blip(300,0.22,'sawtooth',0.10); blip(150,0.4,'sine',0.12,0.02); },
  storm(){ if(!AC) return; const buf=AC.createBuffer(1,AC.sampleRate*0.5,AC.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.18)); const s=AC.createBufferSource(); s.buffer=buf; const g=AC.createGain(); g.gain.value=0.18*musicVol+0.06; const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=900; s.connect(f).connect(g).connect(AC.destination); s.start(); },
  foghorn(){ blip(150,0.7,'sine',0.16); blip(151.5,0.7,'sine',0.10); },
};
/* real audio files, synth blips as fallback */
const SND = {};
['bell','foghorn','cue_storm','page_turn'].forEach(k=>{ const a=new Audio(); a.preload='auto'; a.onerror=()=>{}; a.src='assets/'+k+'.mp3'; SND[k]=a; });
let themeEl=null;
function playSnd(k, vol){ const a=SND[k]; if(!a || a.readyState===0) return false;
  try{ const c=a.cloneNode(); c.volume=Math.min(1,(vol!=null?vol:0.5)); c.play().catch(()=>{}); return true; }catch(e){ return false; } }
function theme(on){
  if(on && !themeEl){ themeEl=new Audio(); themeEl.loop=true; themeEl.preload='auto'; themeEl.onerror=()=>{ themeEl=null; }; themeEl.src='assets/theme_main.mp3'; }
  if(themeEl){ themeEl.volume=0.35*musicVol; if(on){ themeEl.play().catch(()=>{}); } else { try{ themeEl.pause(); }catch(e){} } }
}
/* ============================ COPY POOLS ============================ */
// sky lines: 4+ per band, consumed without replacement per season (no verbatim repeats)
const SKYPOOL = {
  calm: [
    'The glass holds steady and the stars are out.',

function skyBand(s){ return s>=0.55? 'heavy' : s>=0.40? 'mid' : 'calm'; }
function skyOdds(s){
  if(s>=0.8) return 'almost certainly a storm';
  if(s>=0.62) return 'a storm looks likely';

// outcome repeats: first occurrence keeps full prose; repeats use short variants
const REPEATS = {

const BARKS = {

const GOSSIP = {

function pickPool(pool){ if(!pool.length) return null; const i=Math.floor(rng()*pool.length); return pool.splice(i,1)[0]; }
/* ============================ LEVELS ============================ */
const LEVELS = [
  { id:1, name:'The Keeper', term:'a conditioned signal',
    objective:'Earn the crew’s trust. Light the lamp only when a storm is really coming. Do that night after night and the crew learn that the lamp means danger, so they head in when you light it. At each muster, read whether they trust the lamp yet. Build that trust high enough and it will hold on the night the Deep comes.',
    back:null,
    nights:14, deckStorms:5, strata:[[3,4,1],[5,9,3],[10,13,1]],   // [fromNight,toNight,storms]; nights 1-2 always calm so the first boat can fish before any storm
    startTrust:26, heedThreshold:50, catchTarget:40, catchGoal:false, aWolf:0.14, startBoats:7, decay:0, quiet:null,
    musterNights:[4,6,8,11,13], musterNeed:3,
    almanac:'Marisol, at the season’s first tide: “The almanac promises five great squalls, and after them the Deep.”',
    story:{ era:'St. Petersburg, the 1900s',
      body:'Ivan Pavlov was studying how dogs digest their food. He noticed something strange. The dogs started to drool before any food showed up, as soon as they heard the footsteps of the man who fed them. So Pavlov tried a test. He rang a bell right before each meal, over and over. After enough meals, the bell by itself made the dogs drool, with no food in sight. A sound that used to mean nothing now meant that food was coming.',
      tie:'In this season, your lamp is Pavlov’s bell and the storm is the food. The crew learning to trust the light is the dog learning to drool at the bell. Warn them honestly, night after night, and watch that trust build.',

    debrief:{ body:'The lamp comes to mean danger to the crew only when you light it before real storms, night after night. Every time you light it and no storm comes, it means a little less to them. A signal that starts to stand for what comes after it, the way the lamp starts to stand for the storm, is what psychologists call <b>a conditioned signal</b>. Building that response up, night by night, is called <b>acquisition</b>.',
      transfer:'A fire alarm that goes off for burnt toast twice a week. What happens to how people act on it, and why?',

      body:'Mary Cover Jones worked with a boy named Peter who was terrified of a white rabbit, and of most furry things too. Each day she placed the rabbit a little closer while Peter ate a snack he liked, and she let him watch other children hold the rabbit calmly. Little by little, his fear faded. Jones was one of the first to show that a learned fear can be undone, and she is often called the mother of behavior therapy.',

function computePayout(won){

// the storm deck: exactly deckStorms storm cards, stratified so no two-hit crossing can
// happen before night 5. Randomize the ORDER of nights, never the season's storm supply.
function buildDeckWith(nights, strata, avoid){
  const deck=Array(nights-1).fill(false);
  for(const [a,b,k] of strata){
    const slots=[]; for(let n=a;n<=b;n++){ const i=n-1; if(i>=0 && i<deck.length && !(avoid&&avoid[i])) slots.push(i); }
    for(let j=0;j<k && slots.length;j++){ const r=Math.floor(rng()*slots.length); deck[slots.splice(r,1)[0]]=true; }
  }
  return deck;
}

// Read-only measurement: run the lamp up COLD over a flat sea and count how many of the crew still
// break for the harbor at the SIGNAL ALONE. That count is the conditioned response to the bell with no
// food behind it. It draws ONLY from auxRng and writes ONLY probe fields, so the fairness battery is
// untouched. It grows across acquisition and shrinks across extinction.
function runProbe(assoc, thresh){
  const rfx = probeReflex(assoc, thresh);
  const scramble = binomAux(CONFIG.crewN, rfx);   // out of the seven CREW (people), not boats, so boat attrition cannot mask the reflex
  const prev = G.lastProbe;
  const p = { night:G.night, rfx:+rfx.toFixed(3), scramble, delta: prev? scramble-prev.scramble : null };
  G.probeHistory.push(p); G.lastProbe = p;

}

// SEASON 4 (operant): reward or bank the ration for the behavior the crew just emitted.
function decideOperant(reinforce){

  if(reinforce && drilled){ dR=L.aReinforce*(100-G.readiness); dS=-L.sDecay; kind='reinDrill';
    head='You rewarded the drill.'; body='They ran it on their own, and you made it pay. A behavior followed by something they value is done more often.'; }
  else if(!reinforce && drilled){ dR=-L.extRate; kind='holdDrill';
    head='You held the ration.'; body='They ran the drill and got nothing for it. A drill that stops paying begins to fade.'; }
  else if(reinforce && !drilled){ dS=L.aSuper*(100-G.ritual); dR=-(L.ritualR||0); kind='reinRitual';
    head='A reward with nothing behind it.'; body='They only kept to the deck tonight, so the ration built no drill, only the idle habit you happened to reward, and the crew learns the wrong lesson about what earns your rum.'; }
  else { dR=-L.idleDecay; dS=-1; kind='holdRitual';

  const earned = drilled ? (L.catchDrill||0) : L.catchPerNight; G.catch+=earned;

function scoreMuster(){

    G.musterCount++; G.dCount++; if(decoyRight){ G.musterRight++; G.dRight++; } }

    // SEASON 4: no warning is possible; the crew survive only if the drill is a self-started habit
    const strong = G.readiness>=thresh, ritualWon = G.ritual>=G.readiness;
    const survived = strong && !ritualWon;
    let head, body;
    if(survived){ G.crewOut=false; head='They were already moving.';
      body='No bell, no lamp, no warning. The Deep rises, and the crew are already hauling the boats up the ramp and manning the wall, on their own, because you taught them it pays.'; }
    else { G.boats=0; head='The Deep took them.';
      body = ritualWon ? 'The Deep rises, and the crew fall to the same idle habit you kept rewarding, a ritual that holds back nothing, and the water takes them at the rail.'
                       : 'The Deep rises with no warning, and the crew stand frozen at the rail. The drill never became theirs, and they did not move in time.'; }
    G.finaleRitualLoss = ritualWon;   // whenever the idle ritual matched or beat the drill, the crew died of superstition
    G.readinessHistory.push(+G.readiness.toFixed(1)); G.ritualHistory.push(+G.ritual.toFixed(1)); G.trustHistory.push(G.readiness);
    G.nightLog.push({ n:G.night, sky:null, storm:true, lit:false, moored:(survived?'drill':'deck'), kind:(survived?'hit':'miss'), trust:+G.readiness.toFixed(1) });
    G.outcome={ kind:survived?'hit':'miss', head, body, dTrust:0, lostBoat:!survived, earned:0, storm:true, heedNow:survived, insight:null, bark:null, firstOfKind:false, concept:null };
    G.log.push(survived?'hit':'miss');
    state='resolved'; presentOutcome(); return;
  }
  const believed = G.trust >= thresh;                 // the lamp is trusted
  const decoyPulls = G.isDecoy && G.vMinus >= thresh; // Sefu's light still drags them out (discrimination failed)
  const willStay = believed && !decoyPulls;
  let head, body, lostBoat=false;
  if(lit && willStay){ G.crewOut=false; head='The watch held.';
    body='The bell carries. One by one the lanterns turn for the harbor. Every night you called right bought this one. The Deep rose into an empty harbor and sank back.'; }
  else { G.boats=0; lostBoat=true; head='The Deep took them.';
    body = (lit && decoyPulls) ? 'The bell carries, but half the fleet rows for Sefu’s lantern down the shore, still unable to tell it from your warning, and the Deep took them there.'
         : lit ? 'The bell carries and the fleet sails past it. Too many lit nights came to nothing. They stopped counting yours.'
               : 'The lamp is lit nowhere and the bell never rings. Whatever the crew believed, you did not ask them to prove it, and the Deep rose on the fleet at sea.'; }
  G.finaleDecoyLoss = lit && believed && decoyPulls;
  G.stats[ willStay&&lit ? 'hit':'miss' ]++;
  G.trustHistory.push(G.trust); if(G.isDecoy) G.vMinusHistory.push(+G.vMinus.toFixed(1));
  G.nightLog.push({ n:G.night, sky:null, storm:true, lit, moored:null, kind:(willStay&&lit?'hit':'miss'), trust:+G.trust.toFixed(1) });
  G.outcome = { kind: willStay&&lit?'hit':'miss', head, body, dTrust:0, lostBoat, earned:0, storm:true, heedNow:willStay, insight:null, bark:null, firstOfKind:false };
  G.log.push(G.outcome.kind);
  state='resolved'; presentOutcome();
}
/* THE LIVE ACADEMIC LABEL: every conditioning night, name the trial in the field's own terms (CS/US/CR
   and the process) with a directional pulse. NEVER a running number: that would turn the muster into a
   lookup and delete the read-the-crew skill. The real magnitude is the debrief curve. */
function conceptNote(kind, dTrust, dVMinus, lev, isDecoy, lit){
  const m=Math.abs(dTrust), A=d=>d.repeat(m>=10?3:m>=4?2:1), s2=lev.id===2;
  // SEASON 4 (operant): name the reinforcement contingency
  if(lev.id===4){
    if(kind==='reinDrill') return { term:'the law of effect', s4:true,
      txt:'The drill (an <b>operant</b> behavior the crew ran on their own) was followed by a reward. Reinforced, it <b>grows stronger '+A('▲')+'</b>.' };
    if(kind==='holdDrill') return { term:'extinction', s4:true,
      txt:'The crew drilled and got nothing for it. A behavior that stops paying off <b>fades '+A('▽')+'</b>.' };
    if(kind==='reinRitual') return { term:'superstition', s4:true,
      txt:'You reinforced no drill, only the idle deck ritual. A reward that follows the wrong action <b>builds that action ▲</b> while the drill you wanted <b>loses ground ▽</b>.' };
    return { term:'no behavior to reward', s4:true,
      txt:'The crew kept to the deck, so there was no drill to reinforce. The ration is saved, and the fleet fished.' };
  }
  // SEASON 3: two lights, a discrimination trial
  if(isDecoy){
    const dm=Math.abs(dVMinus||0), Ad=d=>d.repeat(dm>=6?3:dm>=2?2:1);
    if(kind==='decoyClear') return { term:'discrimination training', s3:true,
      txt:'Sefu’s lantern <b>(CS-)</b> stood alone and no storm came. An unconfirmed look-alike <b>loses its hold '+Ad('▽')+'</b>, and the crew learns to tell it from your lamp.' };
    if(kind==='coFa'||kind==='hit') return { term:'the two lights blur', s3:true,
      txt:'Both lights burned, so the crew could not tell which the weather answered. What they learn sticks to <b>both</b>, and Sefu’s useless light keeps its hold.' };
    if(kind==='miss') return { term:'the danger, unsignaled', s3:true,
      txt:'The storm <b>(US)</b> came with your lamp dark. The lamp’s credit as a warning <b>slips '+A('▽')+'</b>.' };
  }
  if(kind==='hit') return { term:'acquisition',
    txt:'A pairing: the lamp <b>(CS)</b> came just before the storm <b>(US)</b>. The crew’s bond to the lamp <b>strengthens '+A('▲')+'</b>.' };
  if(kind==='fa') return { term:s2?'extinction':'an unpaired signal',
    txt:'The lamp <b>(CS)</b> burned with no storm behind it. A signal that keeps coming up empty <b>loses its hold '+A('▽')+'</b>.' };
  if(kind==='miss') return { term:'the danger, unsignaled',
    txt:'The storm <b>(US)</b> came with no lamp before it. The lamp’s credit as a warning <b>slips '+A('▽')+'</b>.' };
  if(s2 && m>=0.5) return { term:'extinction',
    txt:'No storm came to confirm the lamp. Left unused, the crew’s bond to it quietly <b>fades '+A('▽')+'</b>.' };
  return { term:'no trial tonight',
    txt:'The lamp stayed dark, so there was no signal to learn from. The crew simply fished.' };
}
/* one-shot educational insights, in plain language, at the moment each first happens */
function readInsight(kind, heedNow){
  const I=G.insights, L=G.lev;
  if(L.id===4){
    if(kind==='reinDrill' && !I.effect){ I.effect=1;
      return 'You rewarded a drill the crew ran on their own, and it will grow stronger for it. A behavior followed by something the doer values is repeated more often, which Thorndike called <b>the law of effect</b>.'; }
    if(kind==='reinRitual' && !I.super){ I.super=1;
      return 'You gave a ration on a night the crew only stood around the deck. A reward that follows no real effort builds the idle habit instead, the kind of accidental ritual Skinner watched pigeons form when fed on a timer.'; }
    if(kind==='holdDrill' && !I.opext){ I.opext=1;
      return 'They ran the drill and you gave nothing, so it will fade a little. A behavior that stops paying off weakens, which is <b>extinction</b> again, now on an action rather than a signal.'; }
    return null;
  }
  if(L.id===3){
    if(kind==='decoyClear' && G.decoyMoored>=4 && !I.gen){ I.gen=1;
      return 'They moored for Sefu’s lantern too. Because it looks like your lamp, the meaning of your lamp has spread to it, and psychologists call that spreading <b>generalization</b>.'; }
    if((kind==='hit'||kind==='coFa') && !I.colit){ I.colit=1;
      return 'Both lights burned at once, so the crew could not tell which one the weather answered. What they learn tonight sticks to both, and blurring the two keeps them from learning the difference.'; }
    if(kind==='decoyClear' && G.vMinus < L.heedThreshold && G.decoyMoored<=3 && !I.disc){ I.disc=1;
      return 'Fewer stood in for Sefu’s light this time. They are learning to hold for your lamp and let his burn unheeded. Telling the two apart like this is <b>discrimination</b>.'; }
  }
  if(L.decay && G.inQuiet && G.trust < L.startTrust-6 && !I.fade){ I.fade=1;
    return 'It has been a long run of calm, with no storm to prove the lamp right. Fewer moor each time you light it, and what you taught them last season is wearing thin.'; }
  if(kind==='hit' && heedNow && !I.heed){ I.heed=1;
    return 'For the first time, most of the crew got safely into port on your word, before the first wave. The lamp has come to stand for a storm in their minds, and that learned response is the thing you have been building all along.'; }
  if(kind==='hit' && !heedNow && !I.right){ I.right=1;
    return 'Your lamp was right, and the storm came just as it promised. The crew saw that. Most did not stay in this time, but a warning that keeps coming true is how their belief is built, one night at a time.'; }
  if(kind==='fa' && G.trust>22 && !I.wolf){ I.wolf=1;
    return 'You warned them and the night stayed calm. A signal that turns out wrong, often enough, slowly loses its hold on them.'; }
  return null;
}

// state resolves synchronously above; presentation staggers WHAT THE PLAYER SEES:
// beat 1 the dock answers the lamp, beat 2 the weather answers the night.
function presentOutcome(){
  const tok=++beatTok;
  const o=G.outcome;
  const showDock = !isOperant(G.lev) && ((o.moored!=null) || (o.decoyMoored!=null));   // operant has no dock-then-weather beat
  if(TESTMODE || !motionOK || !showDock || G.finale){ finishOutcome(tok); return; }
  G.beat=1; renderDecision();
  setTimeout(()=>{ if(tok!==beatTok || state!=='resolved') return; finishOutcome(tok); }, CONFIG.beatMs);
}
function finishOutcome(tok){
  G.beat=2;
  const o=G.outcome;
  if(o.storm){ if(!playSnd('cue_storm',0.4)) snd.storm(); if(motionOK && !TESTMODE){ shake=Math.min(1,shake+0.6); spawnRain(); } flashT= o.lostBoat?0.5:0.25; }
  if(o.kind==='hit'&&o.heedNow) snd.good(); else if(o.lostBoat) snd.bad();
  renderDecision();
  // quiet-night auto-advance: only pure calm fishing nights with nothing to read
  if(!TESTMODE && o.kind==='cr' && !o.insight && !o.lostBoat && !G.isMuster && !o.firstOfKind && !G.finale){
    const a=++autoTok; document.getElementById('next').classList.add('auto');
    setTimeout(()=>{ if(a===autoTok && state==='resolved') nextNight(); }, CONFIG.autoMs);
  }
}
/* ============================ SEASON FLOW ============================ */
function proceed(){ if(state!=='resolved') return;
  autoTok++; document.getElementById('next').classList.remove('auto');
  if(G.boats<=0 && !G.finale){ endGame(false,'boats'); return; }
  if(G.finale){
    const survived = !G.crewOut && G.boats>0;
    const fed = (G.lev.catchGoal===false) ? true : (G.catch>=G.lev.catchTarget);   // Season 1 is trust-only; fish becomes a goal from Season 2
    const readEnough = G.musterRight >= (G.lev.musterNeed||0) && G.dRight >= (G.lev.decoyNeed||0);
    let reason='win';
    if(!survived) reason = isOperant(G.lev)? (G.finaleRitualLoss?'superstition':'weak') : (G.finaleDecoyLoss? 'decoy':'deep');
    else if(!fed) reason='hungry'; else if(!readEnough) reason='misread';
    endGame(survived && fed && readEnough, reason);
    return;
  }
  // MERCY RULE (classical seasons only): end a mathematically-lost season early rather than grind it out.
  if(!isOperant(G.lev) && G.night>=5){
    let t=G.trust; const left=G.lev.deckStorms - G.stormsSpent;
    for(let i=0;i<left;i++) t += CONFIG.aRight*(100-t);
    if(t < 45){ endGame(false,'mercy'); return; }
  }
  G.night++; rollNight();
  if(G.finale && FINALE_INTROS[G.lev.id] && !G.finaleIntroShown && !TESTMODE){   // explain the Deep before the last night
    G.finaleIntroShown=true; showDialogue(FINALE_INTROS[G.lev.id], ()=>{ state='reading'; renderDecision(); canvas.focus({preventScroll:true}); }); return;
  }
  state='reading'; renderDecision();
}
function nextNight(){ proceed(); }
function endGame(won,reason){ state = won?'won':'lost'; G.endReason=reason||(won?'win':'boats');
  G.payout=computePayout(won); if(!TESTMODE){ save.money += G.payout.total; saveProgress(); }   // every run banks the fish money; a win adds wage + bonuses. never in the battery
  (won?snd.good:snd.bad)(); if(!playSnd('foghorn',0.5)) snd.foghorn(); playSnd('page_turn',0.35); renderOverlay(); }

        announce('A muster. Will the crew run the drill unbidden tonight?'); return;

      cl.innerHTML='<div style="text-align:center">'

        + '<div class="small" style="margin-top:6px;color:#cfe0f2">'+deltaTxt+'</div>'
        + insightLine
        + '<div class="small" style="margin-top:9px;color:#9fb4cc">press Space, or tap, to go on &#9656;</div></div>';
      announce(lp.scramble+' of seven broke for the lamp alone.');
      return;
    }
    if(G.isMuster && !G.musterAnswered){
      musterRow.hidden=false; choiceRow.hidden=true; $('sky').hidden=true;
      const askDecoy = (G.isDecoy && !G.finale && G.musterPhase===1);
      const M='assets/portrait_marisol.webp';
      const face='<img src="'+M+'" alt="Marisol, the harbormaster" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--lampDk);box-shadow:0 2px 10px rgba(0,0,0,.45);margin-bottom:6px" onerror="this.style.display=\'none\'">';

      } else {
        $('btnRing').innerHTML='They will heed<span class="sub">the lamp holds them in</span>';
        $('btnWave').innerHTML='They will not<span class="sub">they sail out anyway</span>';
      }
      if(!TESTMODE && G.musterPhase===0){ $('btnRing').disabled=true; $('btnWave').disabled=true;
        const tok=++beatTok; setTimeout(()=>{ if(tok===beatTok && state==='reading'){ $('btnRing').disabled=false; $('btnWave').disabled=false; } }, CONFIG.bellMs); }
      else { $('btnRing').disabled=false; $('btnWave').disabled=false; }
      const mstake = (!G.finale && !G.isDecoy && G.lev.musterNeed) ? '<div class="small" style="margin-top:8px;color:#f5c14e">You must read the crew right on at least <b>'+G.lev.musterNeed+' of the season’s '+G.lev.musterNights.length+'</b> musters, or you lose their trust and the season. Right so far: <b>'+G.musterRight+'</b>.</div>' : '';
      cl.innerHTML = G.finale
        ? '<b>The lowest tide of the year. The water has gone wrong, and the glass shows nothing.</b><br>There is no storm to read tonight. Read the trust bar instead'+(G.isDecoy?', and whether the crew can still tell your lamp from Sefu’s':'')+': above the line, they trust the lamp enough to heed it blind. Ring the bell to call them in, or wave the fleet out.'
        : askDecoy
          ? '<div style="text-align:center">'+face+'<div>And Sefu’s lantern. <b>If only that burned tonight, would the crew turn for it too?</b> Go by what the dock has shown you, not by what you hope they have learned.</div></div>'

    } else {
      musterRow.hidden=true; choiceRow.hidden=false; $('btnLight').disabled=false; $('btnDark').disabled=false;

        + (hasGlass && G.night===1 ? ' <span style="color:#9fd8b0">The dial above is your barometer: the further toward STORM, the likelier a storm.</span>' : '')
        + (G.isMuster && G.musterAnswered && !G.isDecoy ? '<div class="bark"><img src="assets/portrait_marisol.webp" alt="" onerror="this.style.display=\'none\'"><span>'+gossipLine()+'</span></div>' : '')
        + (G.inQuiet ? ' <span style="color:var(--warn)">The calm holds.</span>' : '');
      announce('Night '+G.night+'. '+G.skyLine+' '+skyOdds(G.sky)+(G.isDecoy?'. Sefu’s lantern is lit. Light your lamp too, or keep the tower dark?':'. Light the lamp, or leave it dark?'));
    }
  } else if(state==='resolved'){
    musterRow.hidden=true; choiceRow.hidden=true; $('sky').hidden=true;
    const o=G.outcome;
    if(G.beat===1){
      nextRow.hidden=true; $('fieldnote').hidden=true;
      cl.innerHTML='<b>The dock answers first.</b> '+(o.moored!=null? '<b>'+ucFirst(crewWord(o.moored))+'</b> moor under your light (the conditioned response), and the rest slip past it.'
        : o.decoyMoored!=null? '<b>'+ucFirst(crewWord(o.decoyMoored))+'</b> turn for Sefu’s lantern, and the rest read the sky for themselves.' : '');
      return;
    }
    nextRow.hidden=false;
    // the psychology lens: name the trial in the field's terms
    const fn=$('fieldnote');
    if(o.concept && !G.finale){ fn.hidden=false; fn.classList.toggle('s3', !!(o.concept.s3||o.concept.s4)); fn.innerHTML='<span class="pill">'+o.concept.term+'</span><span class="lens">the psychology</span><span class="txt">'+o.concept.txt+'</span>'; }
    else fn.hidden=true;
    let extra='';
    if(o.lostBoat && !G.finale) extra=' A boat is lost.';
    else if(o.earned) extra=' +'+o.earned+' catch.';
    let mnote='';
    if(G.lastMuster){ const lm=G.lastMuster;
      let lampMsg;
      if(op){ lampMsg = lm.lampRight? 'You read the drill right.' : (lm.lampCall? 'You called they would drill, but the habit is not there yet.' : 'You called they would not, but the drill is stronger than you thought.'); }
      else lampMsg = lm.lampRight ? 'You read the lamp right.' : (lm.lampCall? 'You called they would heed the lamp, and the season says otherwise.' : 'You called they would not, but their belief has come further than you thought.');
      let decoyMsg='';
      if(lm.decoyCall!=null){ decoyMsg = lm.decoyRight ? ' You read Sefu’s light right too.'
        : (lm.decoyCall? ' But they have learned to ignore Sefu’s lantern more than you thought.' : ' But they still turn for Sefu’s lantern more than you thought.'); }
      const allRight = lm.lampRight && (lm.decoyCall==null || lm.decoyRight);
      mnote = ' <span style="color:'+(allRight?'var(--good)':'var(--bad)')+'">'+lampMsg+decoyMsg+'</span>'; }
    let barkHtml='';
    if(o.bark) barkHtml='<div class="bark"><img src="assets/portrait_odell.webp" alt="Odell" onerror="this.style.display=\'none\'"><span>'+o.bark+'</span></div>';
    cl.innerHTML = (o.head?'<b>'+o.head+'</b> ':'')+o.body+extra+mnote+barkHtml;
    const ins=$('insight');
    if(o.insight){ ins.hidden=false; ins.innerHTML='<span class="lab">From the keeper’s log</span><span class="txt">'+o.insight+'</span>'; }
    else ins.hidden=true;
    $('next').innerHTML = ((G.finale||G.boats<=0)? 'See how the season ends':'Next night')+'<span class="ring"></span>';
    announce((o.head||'')+' '+o.body+extra);
  }
}

/* ============================ SLIDESHOW ============================ */
// Paged, one-idea-per-screen presentation of the psychology, with a visual on every slide, so the
// teaching cannot be scrolled past. Each slide: {kicker,title,visual(html),body(html)}; the last slide
// carries action buttons via slide.actions, wired by the wire() callback.
let _slides=null, _slideIx=0, _slideWire=null;
function imgSlide(src, alt, cls){ return '<img class="'+(cls||'')+'" src="assets/'+src+'" alt="'+(alt||'')+'" onerror="this.style.display=\'none\'">'; }
function renderSlides(slides, wire){ _slides=slides.filter(Boolean); _slideIx=0; _slideWire=wire||null; drawSlide(); }
function drawSlide(){
  if(!_slides) return;
  const s=_slides[_slideIx], n=_slides.length, last=_slideIx===n-1;
  const dots=_slides.map((_,i)=>'<span class="dot'+(i===_slideIx?' on':'')+'"></span>').join('');
  overlay.innerHTML = '<div class="slideshow"><div class="slide" data-i="'+_slideIx+'">'
    + (s.kicker?'<div class="kicker">'+s.kicker+'</div>':'')
    + (s.title?'<h2>'+s.title+'</h2>':'')
    + (s.visual?'<div class="slidevisual">'+s.visual+'</div>':'')
    + '<div class="slidebody">'+(s.body||'')+'</div>'
    + '</div>'
    + '<div class="slidenav">'
    +   '<button class="btn" id="slPrev" style="background:linear-gradient(180deg,#8a96a3,#6c7884)'+(_slideIx===0?';visibility:hidden':'')+'">‹ Back</button>'
    +   '<div class="dots">'+dots+'</div>'
    +   (last ? '<span id="slActions">'+(s.actions||'')+'</span>' : '<button class="btn" id="slNext">Next ›</button>')
    + '</div>'
    + (last?'':'<div class="slidehint">use the arrow keys, or Next</div>')
    + '</div>';
  if($('slPrev')) $('slPrev').onclick=()=>{ if(_slideIx>0){ _slideIx--; drawSlide(); } };
  if($('slNext')) $('slNext').onclick=()=>{ if(_slideIx<n-1){ _slideIx++; drawSlide(); } };
  if(_slideWire) _slideWire(_slideIx, last);
}
function slideKey(k){
  if(!_slides) return false;
  if(k==='arrowleft'){ if(_slideIx>0){ _slideIx--; drawSlide(); } return true; }
  if(k==='arrowright'){ if(_slideIx<_slides.length-1){ _slideIx++; drawSlide(); } return true; }
  return false;
}

    let drillNow;
    if(G.finale && state==='resolved') drillNow = !!(G.outcome && G.outcome.heedNow);   // survived == moved == drilled
    else drillNow = !!G.drilled;
    const nb = G? G.boats : 0;
    if(showEmit){
      for(let i=0;i<nb;i++){
        const bob = (motionOK && !drillNow)? Math.sin(animTime*2+i)*3:0;
        if(drillNow){ drawBoat(W*0.44 + i*30, H*0.70 - 2 - i*1.5, 18); }   // hauled up the ramp toward the tower
        else { drawBoat(W*0.08 + i*40, H*0.88 + bob, 24); }                // out fishing on the deck
      }
    }
  } else {
  // the crew's response is read from the boats (out fishing vs moored at the dock), the trust meter, and the
  // "X/7 moored" note, so we no longer scatter crew figures across the open water.
  // boats: out on the water if the crew sailed, else moored at the dock
  const out = G && G.decided && G.crewOut;
  const n = G? G.boats : 0;
  for(let i=0;i<n;i++){
    const bob = motionOK? Math.sin(animTime*2+i)*3:0;
    let x,y;
    if(out){ x = W*0.10 + i*46; y = H*0.88 + bob; }
    else { x = W*0.06 + i*30; y = H*0.90 + bob*0.4; }
    drawBoat(x,y, out? 26:20);
  }
  }
  if(G && G.decided && G.outcome && G.outcome.lostBoat && G.beat===2 && motionOK){
    ctx.save(); ctx.globalAlpha=0.6; ctx.fillStyle='#0c1820'; ctx.beginPath(); ctx.ellipse(W*0.5,H*0.86,40,10,0,0,7); ctx.fill(); ctx.restore();
  }
  // the Deep's shadow: the waterline creeps up from night 9
  if(G && !G.finale && G.night>=9){
    const rise=(G.night-8)*3;
    ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle='#04121c'; ctx.fillRect(0,H-14-rise,W,14+rise); ctx.restore();
  }
  if(rain.length){ ctx.strokeStyle='#9fb0c6'; ctx.lineWidth=2; ctx.globalAlpha=0.6; for(const p of rain){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-3,p.y+p.len); ctx.stroke(); } ctx.globalAlpha=1; }
  if(flashT>0){ ctx.fillStyle='rgba(255,255,255,'+(flashT*0.5)+')'; ctx.fillRect(0,0,W,H); }
}
function drawBoat(x,y,s){ const img=IMG.boat;
  if(img){ const w=s*2.2, h=w*(img.naturalHeight/img.naturalWidth); ctx.drawImage(img,x-w/2,y-h*0.7,w,h); return; }
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#efe2c0'; ctx.beginPath(); ctx.moveTo(0,-s*0.9); ctx.lineTo(0,-s*0.2); ctx.lineTo(s*0.5,-s*0.3); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#c8723f'; ctx.beginPath(); ctx.moveTo(-s*0.7,-s*0.15); ctx.lineTo(s*0.7,-s*0.15); ctx.lineTo(s*0.45,s*0.35); ctx.lineTo(-s*0.45,s*0.35); ctx.closePath(); ctx.fill();
  ctx.restore();
}
/* ============================ LOOP ============================ */
let last=performance.now(), acc=0;
function frame(now){ requestAnimationFrame(frame); let dt=(now-last)/1000; last=now; if(dt>0.25) dt=0.25; acc+=dt; while(acc>=STEP){ update(STEP); acc-=STEP; } render(); }
function update(dt){ animTime+=dt; if(shake>0) shake=Math.max(0,shake-1.4*dt); if(flashT>0) flashT=Math.max(0,flashT-dt*1.6);
  for(let i=rain.length;i--;){ const p=rain[i]; p.y+=p.vy*dt; if(p.y>H*0.78) rain.splice(i,1); } if(rain.length>200) rain.splice(0,rain.length-200);
}
function render(){ const dpr=Math.min(window.devicePixelRatio||1,2); if(canvas.clientWidth>0 && Math.abs(canvas.width-Math.round(canvas.clientWidth*dpr))>2) fit();
  const s=shake*shake; ctx.save(); if(motionOK&&s>0){ ctx.translate(8*s*(Math.random()*2-1),7*s*(Math.random()*2-1)); }
  drawScene(); ctx.restore();
}
/* ============================ INPUT / BOOT ============================ */
$('btnLight').onclick=()=>decide(true);
$('btnDark').onclick=()=>decide(false);
$('btnRing').onclick=()=>muster(true);
$('btnWave').onclick=()=>muster(false);
$('next').onclick=nextNight;
$('bMenu').onclick=()=>{ audioOn(); pauseGame(); };
$('stagewrap').addEventListener('pointerdown',()=>{ if(state==='reading' && G && G.probePhase===1) endProbeBeat(); });
$('vol').addEventListener('input',e=>{ audioOn(); setVol((+e.target.value||0)/100); });
addEventListener('keydown',e=>{ const k=e.key.toLowerCase();
  if(k==='escape'){ if(state==='reading'||state==='resolved'){ e.preventDefault(); pauseGame(); return; } if(state==='paused'){ e.preventDefault(); resumeGame(); return; } }
  if(state==='paused'){ if(k===' '||k==='enter'){ e.preventDefault(); resumeGame(); } return; }
  if(state==='reading'){
    if(G.probePhase===1){ if(k===' '||k==='enter'||k==='arrowright'){ e.preventDefault(); endProbeBeat(); } return; }
    if(G.isMuster && !G.musterAnswered){
      if(k==='r'){ e.preventDefault(); muster(true); } else if(k==='w'){ e.preventDefault(); muster(false); }
    } else {
      if(k==='l'||k===' '){ e.preventDefault(); decide(true); } else if(k==='d'){ e.preventDefault(); decide(false); }
    }
  } else if(state==='resolved'){ if(k===' '||k==='enter'){ e.preventDefault(); if(!G.beat||G.beat===2) nextNight(); } }
  else if(state==='won'||state==='lost'){ if(slideKey(k)) e.preventDefault(); }
  else if(state==='tutorial'){ if(k===' '||k==='enter'){ e.preventDefault(); const b=$('tutBtn'); if(b) b.click(); } }
  else if(state==='dialogue'){ if(k===' '||k==='enter'){ e.preventDefault(); const b=$('dlgBtn'); if(b) b.click(); } }
  else if(state==='shop' && $('buyDlgBtn')){ if(k===' '||k==='enter'){ e.preventDefault(); $('buyDlgBtn').click(); } } });
['pointerdown','keydown'].forEach(ev=>addEventListener(ev,()=>{ audioOn(); if(state==='title'||state==='menu') theme(true); },{once:true}));
levelIdx=0; fit(); renderOverlay(); requestAnimationFrame(frame);
/* test seam */
window.keeper={
  get state(){return state;}, get level(){return levelIdx;},
  get testMode(){return TESTMODE;}, set testMode(v){ TESTMODE=!!v; },
  get save(){return save;},   // battery can equip shop tiers: keeper.save.instrTier=3
  resetSave(){ save=defaultSave(); },
  snapshot(){ return G?{ night:G.night, nights:G.lev.nights, boats:G.boats, trust:+(G.trust||0).toFixed(1), thresh:G.lev.heedThreshold,
      catch:G.catch, target:G.lev.catchTarget, sky:+(G.sky||0).toFixed(2), storm:G.weatherStorm, inQuiet:G.inQuiet,
      isMuster:G.isMuster, musterAnswered:G.musterAnswered, musterCall:G.musterCall, musterPhase:G.musterPhase, finale:G.finale,
      heedP:+(G.heedP||0).toFixed(3), heedTendency:G.heedTendency, moored:G.moored, mooredHistory:G.mooredHistory.slice(),
      isDecoy:G.isDecoy, vMinus:+(G.vMinus||0).toFixed(1), decoyTendency:G.decoyTendency, decoyMoored:G.decoyMoored,
      decoyMooredHistory:(G.decoyMooredHistory||[]).slice(), dRight:G.dRight, dCount:G.dCount, decoyNeed:G.lev.decoyNeed||0,
      musterRight:G.musterRight, musterCount:G.musterCount, musterNeed:G.lev.musterNeed,
      stormsDealt:G.lev.deckStorms, stormsSpent:G.stormsSpent, nightLog:G.nightLog.slice(),
      readiness:+(G.readiness||0).toFixed(1), ritualStrength:+(G.ritual||0).toFixed(1), drilled:G.drilled,
      drillTendency:G.drillTendency, rations:G.rations, operant:isOperant(G.lev),
      probeHistory:G.probeHistory.slice(), lastProbe:G.lastProbe, probePhase:G.probePhase,
      money:save.money, payout:(G.payout?G.payout.total:0),
      reason:G.endReason||null, stats:Object.assign({},G.stats) }:null; },
  start(idx){ newGame(idx==null?levelIdx:idx); state='reading'; overlayWrap.hidden=true; renderDecision(); },
  muster, decide, next:nextNight,
  get over(){return state==='won'||state==='lost';}, get won(){return state==='won';} };
</script>
